{% extends "base.html" %}
{% block content %}
<h2>Регистрация</h2>
{% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}
<form method="post">
    <label>Логин: <input type="text" name="username" required></label><br><br>
    <label>Пароль: <input type="password" name="password" required></label><br><br>
    <button type="submit">Зарегистрироваться</button>
</form>
{% endblock %}
